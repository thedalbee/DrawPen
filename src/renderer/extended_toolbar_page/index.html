<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Extended Toolbar</title>
    <style>
      :root {
        --toolbar-window-margin: 12px; /* Matches with EXTENDED_TOOLBAR_WINDOW_MARGIN */

        /* Keep the BrowserWindow transparent; only the controls draw material. */
        --toolbar-background-color: rgba(18, 18, 20, 0.58);
        --toolbar-background-hover: rgba(34, 34, 38, 0.68);
        --toolbar-border-color: rgba(255, 255, 255, 0.12);
        --toolbar-fg-color: #ffffff;
        --toolbar-hover-bg: rgba(255, 255, 255, 0.08);
        --toolbar-radius: 16px;
        --toolbar-shadow: 0 18px 52px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        --toolbar-blur: blur(34px) saturate(150%);
        --toolbar-height: 48px;
        --toolbar-mode-width: 64px;
        --toolbar-slider-width: 18px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
      }

      button {
        background: none;
        border: none;
        padding: 0;
        cursor: inherit;
      }

      button:focus {
        outline: none;
      }

      button svg {
        pointer-events: none;
      }

      .toolbar-extended {
        position: absolute;
        top: var(--toolbar-window-margin);
        left: var(--toolbar-window-margin);
      }

      #toolbar {
        display: flex;
        overflow: hidden;
        background-color: var(--toolbar-background-color);
        backdrop-filter: var(--toolbar-blur);
        -webkit-backdrop-filter: var(--toolbar-blur);
        border: 1px solid var(--toolbar-border-color);
        border-radius: var(--toolbar-radius);
        filter: drop-shadow(0 14px 36px rgba(0, 0, 0, 0.26));
      }

      .toolbar__close {
        position: absolute;
        top: -9px;
        left: -9px;
        z-index: 3;
        background-color: rgba(16, 16, 18, 0.72);
        border-radius: 999px;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.34);
        color: var(--toolbar-fg-color);
        opacity: 0;
        transform: translate(3px, 3px) scale(0.92);
        transition: opacity 0.12s ease, transform 0.12s ease, background-color 0.12s ease;
      }

      #toolbar:hover .toolbar__close {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }

      .toolbar__close button {
        display: flex;
        padding: 4px;
        justify-content: center;
        align-items: center;
        color: var(--toolbar-fg-color);
      }

      .toolbar__close svg {
        width: 12px;
        height: 12px;
        color: var(--toolbar-fg-color);
        fill: var(--toolbar-fg-color);
      }

      .toolbar__mode-switcher {
        display: flex;
        width: var(--toolbar-mode-width);
        background-color: transparent;
        border: 0;
        color: var(--toolbar-fg-color);
        cursor: move;
      }

      .toolbar__main-button {
        display: flex;
        padding: 8px 9px;
      }

      .toolbar__main-button button {
        display: flex;
        align-self: center;
        cursor: pointer;
        color: var(--toolbar-fg-color);
        border-radius: 12px;
        transition: background-color 0.12s ease, transform 0.12s ease;
      }

      .toolbar__main-button button:hover {
        background-color: var(--toolbar-hover-bg);
      }

      .toolbar__main-button button:active,
      .toolbar__close button:active,
      .toolbar__slider:active {
        transform: scale(0.95);
      }

      .toolbar__main-button svg {
        width: 46px;
        height: 46px;
        color: var(--toolbar-fg-color);
        stroke: var(--toolbar-fg-color);
      }

      .toolbar__slider {
        height: var(--toolbar-height);
        width: var(--toolbar-slider-width);
        display: flex;
        align-self: center;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        border: 0;
        border-left: 1px solid var(--toolbar-border-color);
        background-color: transparent;
        color: var(--toolbar-fg-color);
        cursor: pointer;
        transition: background-color 0.12s ease, transform 0.12s ease;
      }

      .toolbar__slider:hover {
        background-color: var(--toolbar-background-hover);
      }

      .toolbar__slider svg {
        width: 16px;
        height: 16px;
        color: var(--toolbar-fg-color);
        fill: var(--toolbar-fg-color);
      }
    </style>
  </head>

  <body>
    <aside id="toolbar" class="toolbar-extended">
      <div class="toolbar__mode-switcher">
        <div class="toolbar__main-button">
          <button tabindex="-1" title="Draw Mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="toolbar__slider">
        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 256 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
          <path d="M224.3 273l-136 136c-9.4 9.4-24.6 9.4-33.9 0l-22.6-22.6c-9.4-9.4-9.4-24.6 0-33.9l96.4-96.4-96.4-96.4c-9.4-9.4-9.4-24.6 0-33.9L54.3 103c9.4-9.4 24.6-9.4 33.9 0l136 136c9.5 9.4 9.5 24.6.1 34z"></path>
        </svg>
      </div>

      <div class="toolbar__close">
        <button tabindex="-1">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path>
          </svg>
        </button>
      </div>
    </aside>
  </body>
</html>
